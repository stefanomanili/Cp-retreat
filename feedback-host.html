<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Feedback Host · CosaRetreat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #eeebe4;
    --border: #dedad2; --accent: #b8941e; --text: #1a1814;
    --muted: #5e5a54; --success: #2a7a48; --success-bg: #e8f5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); font-family: 'Montserrat', 'DM Sans', sans-serif; color: var(--text); height: 100%; overflow: hidden; }

  /* LAYOUT */
  .app { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 280px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; padding: 20px 16px;
  }
  .sidebar-logo { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-bottom: 20px; }
  .sidebar-logo em { color: var(--accent); font-style: italic; }
  .sidebar-logo a { text-decoration: none; color: inherit; }
  .sidebar-section { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; margin-top: 20px; }

  .scenario-btn {
    width: 100%; text-align: left; background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
    font-family: 'Montserrat', 'DM Sans', sans-serif; transition: all 0.15s;
  }
  .scenario-btn:hover { border-color: var(--accent); background: #fff8ec; }
  .scenario-btn.active { background: #fff8ec; border-color: var(--accent); }
  .scenario-btn .snum { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--accent); letter-spacing: 0.08em; }
  .scenario-btn .stitle { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-top: 2px; }
  .scenario-btn .scast { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }
  .scenario-btn .svotes { font-size: 0.7rem; color: var(--success); margin-top: 3px; }

  .btn-activate {
    width: 100%; padding: 0.7em; border-radius: 8px; border: none;
    font-family: 'Montserrat', 'DM Sans', sans-serif; font-size: 0.85rem; font-weight: 600;
    background: var(--accent); color: #fff; cursor: pointer; margin-top: 8px;
    transition: background 0.15s;
  }
  .btn-activate:hover { background: #a07a18; }
  .btn-stop {
    width: 100%; padding: 0.7em; border-radius: 8px;
    border: 1px solid #f0c0b8; font-family: 'Montserrat', 'DM Sans', sans-serif;
    font-size: 0.85rem; font-weight: 600; color: #c0503a;
    background: none; cursor: pointer; margin-top: 6px; transition: background 0.15s;
  }
  .btn-stop:hover { background: #fce8e6; }

  .share-box {
    background: var(--surface2); border-radius: 8px; padding: 10px;
    margin-top: 16px; display: flex; align-items: center; gap: 8px;
  }
  .share-url { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--muted); flex: 1; word-break: break-all; }
  .copy-btn {
    flex-shrink: 0; background: var(--accent); color: #fff; border: none;
    padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; cursor: pointer;
  }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; padding: 28px 32px; }

  .main-header { margin-bottom: 24px; }
  .main-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .main-title { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -0.5px; }
  .main-title em { color: var(--accent); font-style: italic; }
  .main-sub { font-size: 0.85rem; color: var(--muted); margin-top: 4px; }

  .status-bar {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
  }
  .status-label { font-size: 0.85rem; color: var(--muted); }
  .status-label b { color: var(--text); }
  .status-pill {
    font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.08em;
    padding: 4px 12px; border-radius: 20px;
    background: var(--surface2); color: var(--muted);
  }
  .status-pill.active { background: var(--success-bg); color: var(--success); }

  /* RESULTS */
  .votes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; margin-bottom: 24px; }

  .voter-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
  }
  .voter-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .voter-name .pending-tag { font-size: 0.65rem; color: var(--muted); font-weight: 400; font-family: 'DM Mono', monospace; }
  .voter-name .done-tag { font-size: 0.65rem; color: var(--success); font-weight: 600; }

  .mini-stars { display: flex; gap: 2px; font-size: 0.8rem; color: var(--accent); }
  .mini-stars .empty { color: #d0ccc4; }
  .voter-dim { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between; }
  .voter-note { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--surface2); line-height: 1.4; }

  /* AGGREGATE */
  .agg-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px;
  }
  .agg-title { font-family: 'DM Serif Display', serif; font-size: 1.1rem; margin-bottom: 14px; }
  .agg-title em { color: var(--accent); font-style: italic; }
  .agg-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .agg-label { font-size: 0.8rem; color: var(--muted); min-width: 160px; }
  .agg-bar-bg { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; }
  .agg-bar-fill { height: 8px; background: var(--accent); border-radius: 4px; transition: width 0.4s; }
  .agg-score { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent); min-width: 30px; text-align: right; }

  .notes-list { margin-top: 16px; }
  .note-item { background: var(--surface2); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-size: 0.82rem; color: var(--muted); font-style: italic; line-height: 1.5; }
  .note-author { font-style: normal; font-weight: 600; color: var(--text); font-size: 0.75rem; margin-bottom: 3px; }

  .conn-badge {
    position: fixed; top: 14px; right: 16px;
    font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted);
    z-index: 100; display: flex; align-items: center; gap: 0.4em;
  }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .conn-badge.ok .conn-dot { background: var(--success); }
  .conn-badge.err .conn-dot { background: #c0503a; }
</style>
</head>
<body>

<div class="conn-badge" id="connBadge"><span class="conn-dot"></span><span id="connText">Connessione...</span></div>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-logo">Cosa<em>Retreat</em></div>

    <div class="sidebar-section">Scenari</div>
    <div id="scenarioBtns"></div>

    <div class="sidebar-section">Controlli</div>
    <button class="btn-activate" id="btnActivate" onclick="activateScenario()">▶ Attiva scenario</button>
    <button class="btn-stop" id="btnStop" onclick="stopScenario()" style="display:none">⏹ Chiudi feedback</button>
    <button onclick="resetFeedbackData()" style="margin-top:8px;width:100%;padding:0.6em;border-radius:8px;border:1px solid #f0c0b8;font-family:'Montserrat',sans-serif;font-size:0.8rem;font-weight:600;color:#c0503a;background:none;cursor:pointer;">🗑️ Reset completo (test)</button>

    <div class="share-box">
      <span class="share-url" id="shareUrl">—</span>
      <button class="copy-btn" id="copyBtn">Copia</button>
    </div>
    <div style="margin-top:auto;padding-top:16px;text-align:center"><a href="index.html" style="font-family:'Montserrat',sans-serif;font-size:0.75rem;color:#5e5a54;text-decoration:none;">← Torna all'Agenda</a></div>
</div>

  <!-- MAIN -->
  <div class="main">
    <div class="main-header">
      <div class="main-eyebrow">Role Play · Feedback</div>
      <div class="main-title">Sales <em>Challenge</em></div>
      <div class="main-sub">Seleziona uno scenario dalla sidebar e attivalo per raccogliere i feedback.</div>
    </div>

    <div class="status-bar">
      <div class="status-label" id="statusLabel">Nessuno scenario attivo</div>
      <div class="status-pill" id="statusPill">In attesa</div>
    </div>

    <div id="resultsArea"></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var PLAYERS = ["Marco","Francesca","Tommaso","Margherita","Federica","Stefano","Daniele","Domitilla","Carola","Andrea","Giorgia"];
var SCENARIOS = [
  { num:"01", titolo:"Il pranzo mensile che non decolla",     venditore:"Francesca", cliente:"Domitilla" },
  { num:"02", titolo:"Il budget che non c'è (ancora)",       venditore:"Federica",  cliente:"Marco"     },
  { num:"03", titolo:"Il confronto prezzi al ribasso",        venditore:"Margherita",cliente:"Stefano"   },
  { num:"04", titolo:"Il cliente vago che non sa cosa vuole", venditore:"Tommaso",   cliente:"Daniele"   },
  { num:"05", titolo:"Il cliente attivo che non cresce",      venditore:"Carola",    cliente:"Marco"     },
  { num:"06", titolo:"Il gatekeeper impossibile",             venditore:"Marco",     cliente:"Stefano"   }
];
var DIMENSIONS = ["Ascolto attivo","Discovery (domande)","Gestione obiezioni","Closing & next step","Tono e linguaggio"];

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var fbRoot   = db.ref("cosaportoFeedback");
var stateRef = fbRoot.child("state");
var votesRef = fbRoot.child("votes");

var selectedIdx = 0;
var currentState = { active: false, scenarioIdx: null };
var allVotes = {};

// Connessione
db.ref(".info/connected").on("value", function(snap){
  var badge = document.getElementById("connBadge");
  badge.className = "conn-badge " + (snap.val() ? "ok" : "err");
  document.getElementById("connText").textContent = snap.val() ? "Connesso" : "Disconnesso";
});

// Share link
var playerUrl = new URL("feedback-player.html", window.location.href).toString();
document.getElementById("shareUrl").textContent = playerUrl;
document.getElementById("copyBtn").addEventListener("click", function(){
  navigator.clipboard.writeText(playerUrl).then(function(){
    var btn = document.getElementById("copyBtn");
    btn.textContent = "✓";
    setTimeout(function(){ btn.textContent = "Copia"; }, 1500);
  });
});

// Sidebar scenari
function buildSidebar() {
  var container = document.getElementById("scenarioBtns");
  container.innerHTML = "";
  SCENARIOS.forEach(function(s, i){
    var btn = document.createElement("button");
    btn.className = "scenario-btn" + (i === selectedIdx ? " active" : "");
    btn.id = "sbtn-" + i;
    btn.innerHTML =
      "<div class='snum'>SCENARIO " + s.num + "</div>" +
      "<div class='stitle'>" + s.titolo + "</div>" +
      "<div class='scast'>🎙️ " + s.venditore + " · 🧑‍💼 " + s.cliente + "</div>" +
      "<div class='svotes' id='svotes-" + i + "'></div>";
    btn.addEventListener("click", function(){
      selectedIdx = i;
      document.querySelectorAll(".scenario-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      renderResults();
    });
    container.appendChild(btn);
  });
}

function updateVoteCounts() {
  SCENARIOS.forEach(function(_, i){
    var el = document.getElementById("svotes-" + i);
    if (!el) return;
    var votes = allVotes[i] || {};
    var count = Object.keys(votes).length;
    // Chi non deve votare = venditore
    var eligible = PLAYERS.filter(function(p){ return p !== SCENARIOS[i].venditore; }).length;
    el.textContent = count > 0 ? count + " / " + eligible + " voti ricevuti" : "";
  });
}

// Firebase listeners
stateRef.on("value", function(snap){
  currentState = snap.val() || { active: false, scenarioIdx: null };
  updateUI();
});

votesRef.on("value", function(snap){
  allVotes = snap.val() || {};
  updateVoteCounts();
  renderResults();
});

function updateUI() {
  var s = currentState;
  var statusLabel = document.getElementById("statusLabel");
  var statusPill  = document.getElementById("statusPill");
  var btnActivate = document.getElementById("btnActivate");
  var btnStop     = document.getElementById("btnStop");

  if (s.active && s.scenarioIdx !== null) {
    var sc = SCENARIOS[s.scenarioIdx];
    statusLabel.innerHTML = "<b>Scenario " + sc.num + "</b> — " + sc.titolo + " · 🎙️ " + sc.venditore;
    statusPill.textContent = "Feedback aperto";
    statusPill.className = "status-pill active";
    btnActivate.style.display = "none";
    btnStop.style.display = "block";
  } else {
    statusLabel.innerHTML = "Nessuno scenario attivo";
    statusPill.textContent = "In attesa";
    statusPill.className = "status-pill";
    btnActivate.style.display = "block";
    btnStop.style.display = "none";
  }
}

function activateScenario() {
  stateRef.set({ active: true, scenarioIdx: selectedIdx, activatedAt: Date.now() });
}

function resetFeedbackData() {
  if (!confirm("Cancellare tutti i voti feedback?")) return;
  fbRoot.remove().then(function(){ stateRef.set({ active: false, scenarioIdx: null }); });
}

function stopScenario() {
  stateRef.set({ active: false, scenarioIdx: null });
}

// ── RENDER RESULTS ──
function renderResults() {
  var area = document.getElementById("resultsArea");
  var votes = allVotes[selectedIdx] || {};
  var sc = SCENARIOS[selectedIdx];
  var eligible = PLAYERS.filter(function(p){ return p !== sc.venditore; });

  var html = "";

  // Aggregate scores
  var totals = {};
  var counts = {};
  DIMENSIONS.forEach(function(_, di){ totals[di] = 0; counts[di] = 0; });
  var notes = [];

  eligible.forEach(function(player){
    var v = votes[player];
    if (!v) return;
    if (v.scores) {
      Object.keys(v.scores).forEach(function(di){
        totals[di] = (totals[di] || 0) + v.scores[di];
        counts[di] = (counts[di] || 0) + 1;
      });
    }
    if (v.note) notes.push({ name: player, text: v.note });
  });

  // Aggregate card
  html += "<div class='agg-card'>";
  html += "<div class='agg-title'>Scenario " + sc.num + " — <em>" + sc.titolo + "</em></div>";
  html += "<div style='font-size:0.8rem;color:var(--muted);margin-bottom:14px'>🎙️ " + sc.venditore + "  ·  🧑‍💼 " + sc.cliente + "</div>";

  DIMENSIONS.forEach(function(dim, di){
    var avg = counts[di] > 0 ? (totals[di] / counts[di]) : 0;
    var pct = (avg / 5) * 100;
    html += "<div class='agg-row'>" +
      "<div class='agg-label'>" + dim + "</div>" +
      "<div class='agg-bar-bg'><div class='agg-bar-fill' style='width:" + pct + "%'></div></div>" +
      "<div class='agg-score'>" + (avg > 0 ? avg.toFixed(1) : "—") + "</div>" +
      "</div>";
  });

  if (notes.length > 0) {
    html += "<div style='font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-top:16px;margin-bottom:8px'>Commenti</div>";
    html += "<div class='notes-list'>";
    notes.forEach(function(n){
      html += "<div class='note-item'><div class='note-author'>" + n.name + "</div>" + n.text + "</div>";
    });
    html += "</div>";
  }

  html += "</div>";

  // Individual cards
  html += "<div style='font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:12px'>Voti individuali</div>";
  html += "<div class='votes-grid'>";
  eligible.forEach(function(player){
    var v = votes[player];
    html += "<div class='voter-card'>";
    html += "<div class='voter-name'>" + player;
    if (v && v.submittedAt) {
      html += "<span class='done-tag'>✓ inviato</span>";
    } else {
      html += "<span class='pending-tag'>in attesa...</span>";
    }
    html += "</div>";

    if (v && v.scores) {
      DIMENSIONS.forEach(function(dim, di){
        var score = v.scores[di] || 0;
        var stars = "";
        for (var s = 1; s <= 5; s++) {
          stars += "<span class='" + (s <= score ? "" : "empty") + "'>★</span>";
        }
        html += "<div class='voter-dim'><span>" + dim + "</span><div class='mini-stars'>" + stars + "</div></div>";
      });
      if (v.note) {
        html += "<div class='voter-note'>" + v.note + "</div>";
      }
    } else {
      html += "<div style='font-size:0.8rem;color:var(--border);font-style:italic;margin-top:4px'>Nessun voto ancora</div>";
    }
    html += "</div>";
  });
  html += "</div>";

  // Venditore escluso
  html += "<div style='font-size:0.75rem;color:var(--muted);margin-top:4px'>🎙️ <b>" + sc.venditore + "</b> è escluso dal voto come venditore di questo scenario.</div>";

  area.innerHTML = html;
}

buildSidebar();
renderResults();
</script>
</body>
</html>
