<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz - La Macchina degli Appuntamenti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #282C5C;
    --navy-mid: #2D3268;
    --gold: #F5A623;
    --white: #FFFFFF;
    --light: #C8D0E8;
    --grey: #8A90B0;
    --correct-bg: #1A4A2E;
    --correct: #4ADE80;
    --wrong-bg: #4A1A1A;
    --wrong: #F87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; min-height: 100%; background: var(--navy); font-family: 'Montserrat', 'Segoe UI', Arial, sans-serif; color: var(--white); }
  body { display: flex; flex-direction: column; min-height: 100vh; padding: 6vw 6vw 3vh; }
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  .logo { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.25em; color: var(--grey); margin-bottom: 4vh; text-align: center; }

  .title { font-size: 1.5rem; font-weight: 800; color: var(--gold); letter-spacing: 0.05em; margin-bottom: 0.3em; text-align: center; }
  .subtitle { font-size: 0.95rem; color: var(--light); margin-bottom: 3vh; text-align: center; }

  .name-list { display: flex; flex-direction: column; gap: 0.7em; }
  .name-btn { background: var(--navy-mid); border: 1px solid rgba(200,208,232,0.2); border-radius: 12px; padding: 1em; font-size: 1.05rem; font-weight: 600; color: var(--white); cursor: pointer; }
  .name-btn:active { background: var(--gold); color: var(--navy); border-color: var(--gold); }

  .center-msg { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 1em; }
  .center-msg .big { font-size: 1.2rem; font-weight: 700; color: var(--gold); }
  .center-msg .small { font-size: 0.9rem; color: var(--light); }
  .spinner { width: 34px; height: 34px; border: 3px solid var(--navy-mid); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .q-meta { font-size: 0.75rem; color: var(--grey); text-align: center; margin-bottom: 0.5em; }
  .q-bar-bg { width: 100%; height: 5px; background: var(--navy-mid); border-radius: 3px; margin-bottom: 2vh; }
  .q-bar-fill { height: 5px; background: var(--gold); border-radius: 3px; transition: width .4s; }
  .q-text { font-size: 1.25rem; font-weight: 700; line-height: 1.4; margin-bottom: 3vh; text-align: center; }

  .q-opts { display: flex; flex-direction: column; gap: 0.8em; }
  .q-opt { background: var(--navy-mid); border: 1.5px solid rgba(200,208,232,0.2); border-radius: 12px; padding: 1em 1.1em; display: flex; align-items: center; gap: 0.9em; cursor: pointer; }
  .q-opt-label { width: 1.9rem; height: 1.9rem; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; font-weight: 800; color: var(--navy); flex-shrink: 0; }
  .q-opt-text { font-size: 1rem; line-height: 1.35; }
  .q-opt.chosen { border-color: var(--gold); background: rgba(245,166,35,0.15); }
  .q-opt.chosen .q-opt-label { background: var(--gold); }
  .q-opt.correct { background: var(--correct-bg); border-color: var(--correct); }
  .q-opt.correct .q-opt-text { color: var(--correct); font-weight: 700; }
  .q-opt.wrong-chosen { background: var(--wrong-bg); border-color: var(--wrong); }
  .q-opt.wrong-chosen .q-opt-text { color: var(--wrong); }
  .q-opt.locked { pointer-events: none; opacity: 0.75; }

  .status-pill { margin-top: 3vh; text-align: center; font-size: 0.85rem; color: var(--grey); }
  .status-pill b { color: var(--gold); }

  .result-banner { text-align: center; font-size: 1.3rem; font-weight: 800; margin-bottom: 0.4em; }
  .result-banner.ok { color: var(--correct); }
  .result-banner.no { color: var(--wrong); }
  .score-line { text-align: center; font-size: 0.95rem; color: var(--light); margin-bottom: 2vh; }

  .sb-title { font-size: 2rem; font-weight: 800; color: var(--gold); letter-spacing: 0.1em; text-align: center; margin-bottom: 0.5em; }
  .sb-row { display: flex; justify-content: space-between; align-items: center; background: var(--navy-mid); border-radius: 10px; padding: 0.8em 1em; margin-bottom: 0.5em; }
  .sb-row.me { border: 1.5px solid var(--gold); }
  .sb-name { font-weight: 700; }
  .sb-score { font-weight: 800; color: var(--gold); }

  .change-name { margin-top: auto; padding-top: 2vh; text-align: center; font-size: 0.75rem; color: var(--grey); text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<div class="logo">COSAPORTO</div>

<div id="screen-name" class="screen active">
  <div class="title">QUIZ</div>
  <div class="subtitle">La Macchina degli Appuntamenti<br>Scegli il tuo nome per iniziare</div>
  <div class="name-list" id="nameList"></div>
</div>

<div id="screen-waiting" class="screen">
  <div class="center-msg">
    <div class="spinner"></div>
    <div class="big" id="waitingBig">In attesa che l'host avvii il quiz...</div>
    <div class="small" id="waitingSmall">Tieni il telefono a portata di mano</div>
  </div>
</div>

<div id="screen-question" class="screen">
  <div class="q-meta" id="qMeta">Domanda 1 di 10</div>
  <div class="q-bar-bg"><div class="q-bar-fill" id="qBar" style="width:10%"></div></div>
  <div class="q-text" id="qText"></div>
  <div class="q-opts" id="qOpts"></div>
  <div class="status-pill" id="statusPill"></div>
</div>

<div id="screen-finished" class="screen">
  <div class="center-msg">
    <div class="sb-title">FINITO!</div>
    <div class="big" id="finalScore"></div>
    <div class="small">Guarda la classifica completa sullo schermo dell'host</div>
  </div>
</div>

<div class="change-name" id="changeName">Non sei tu? Cambia giocatore</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="quiz-data.js"></script>
<script src="firebase-config.js"></script>
<script>
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var root = db.ref(QUIZ_ROOT);
var stateRef = root.child("state");
var answersRef = root.child("answers");
var scoresRef = root.child("scores");

var myName = localStorage.getItem("cosaportoQuizPlayer");
var lastRenderedQ = -1;

function show(id) {
  document.querySelectorAll(".screen").forEach(function(s){ s.classList.remove("active"); });
  document.getElementById(id).classList.add("active");
}

function renderNameList() {
  var list = document.getElementById("nameList");
  list.innerHTML = "";
  PLAYERS.forEach(function(p){
    var btn = document.createElement("div");
    btn.className = "name-btn";
    btn.textContent = p;
    btn.addEventListener("click", function(){
      myName = p;
      localStorage.setItem("cosaportoQuizPlayer", p);
      init();
    });
    list.appendChild(btn);
  });
}

function renderQuestion(qIdx, revealed, myAnswer) {
  var q = QUESTIONS[qIdx];
  if (qIdx !== lastRenderedQ) {
    document.getElementById("qMeta").textContent = "Domanda " + (qIdx+1) + " di " + QUESTIONS.length;
    document.getElementById("qBar").style.width = (((qIdx+1)/QUESTIONS.length)*100) + "%";
    document.getElementById("qText").textContent = q.q;
    var optsEl = document.getElementById("qOpts");
    optsEl.innerHTML = "";
    q.opts.forEach(function(opt, i){
      var div = document.createElement("div");
      div.className = "q-opt";
      div.id = "opt" + i;
      div.innerHTML = "<div class='q-opt-label'>" + LABELS[i] + "</div><div class='q-opt-text'>" + opt + "</div>";
      div.addEventListener("click", function(){
        submitAnswer(qIdx, i);
      });
      optsEl.appendChild(div);
    });
    lastRenderedQ = qIdx;
  }

  q.opts.forEach(function(_, i){
    var el = document.getElementById("opt" + i);
    if (!el) return;
    el.classList.remove("chosen", "correct", "wrong-chosen", "locked");
  });

  if (myAnswer !== undefined) {
    var chosenEl = document.getElementById("opt" + myAnswer);
    if (chosenEl) chosenEl.classList.add("chosen");
  }

  var statusPill = document.getElementById("statusPill");
  if (revealed) {
    q.opts.forEach(function(_, i){
      var el = document.getElementById("opt" + i);
      if (!el) return;
      el.classList.add("locked");
      if (i === q.ans) el.classList.add("correct");
      else if (i === myAnswer) el.classList.add("wrong-chosen");
    });
    if (myAnswer === q.ans) {
      statusPill.innerHTML = "<b style='color:var(--correct)'>Corretto!</b>";
    } else if (myAnswer !== undefined) {
      statusPill.innerHTML = "<b style='color:var(--wrong)'>Sbagliato</b> — la risposta giusta era " + LABELS[q.ans];
    } else {
      statusPill.innerHTML = "Non hai risposto in tempo. Risposta giusta: " + LABELS[q.ans];
    }
  } else if (myAnswer !== undefined) {
    statusPill.innerHTML = "Risposta inviata: <b>" + LABELS[myAnswer] + "</b> — in attesa degli altri";
  } else {
    statusPill.innerHTML = "Tocca una risposta per inviarla";
  }
}

function submitAnswer(qIdx, idx) {
  stateRef.once("value").then(function(snap){
    var s = snap.val() || {};
    if (s.revealed) return;
    answersRef.child(qIdx).child(myName).set(idx);
  });
}

function showFinalScore() {
  scoresRef.child(myName).once("value").then(function(snap){
    var score = snap.val() || 0;
    document.getElementById("finalScore").textContent = "Hai totalizzato " + score + " / " + QUESTIONS.length;
  });
  show("screen-finished");
}

function init() {
  if (!myName || PLAYERS.indexOf(myName) === -1) {
    renderNameList();
    show("screen-name");
    return;
  }

  stateRef.on("value", function(snap){
    var s = snap.val() || {started:false, currentQ:0, revealed:false, finished:false};

    if (s.finished) {
      showFinalScore();
      return;
    }
    if (!s.started) {
      show("screen-waiting");
      lastRenderedQ = -1;
      return;
    }

    show("screen-question");
    answersRef.child(s.currentQ).child(myName).off("value");
    answersRef.child(s.currentQ).child(myName).on("value", function(mySnap){
      renderQuestion(s.currentQ, s.revealed, mySnap.val());
    });
  });
}

document.getElementById("changeName").addEventListener("click", function(){
  localStorage.removeItem("cosaportoQuizPlayer");
  myName = null;
  stateRef.off();
  renderNameList();
  show("screen-name");
});

init();
</script>
</body>
</html>
