<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>AIdeas Host · CosaRetreat</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Montserrat:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #eeebe4;
    --border: #dedad2; --accent: #b8941e; --text: #1a1814;
    --muted: #5e5a54; --success: #2a7a48; --success-bg: #e8f5ee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); font-family: 'Montserrat', sans-serif; color: var(--text); height: 100%; overflow: hidden; }

  .app { display: flex; height: 100vh; }

  /* SIDEBAR */
  .sidebar {
    width: 260px; flex-shrink: 0;
    background: var(--surface); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; padding: 20px 16px; overflow-y: auto;
  }
  .sidebar-logo { font-family: 'DM Serif Display', serif; font-size: 1rem; margin-bottom: 20px; }
  .sidebar-logo em { color: var(--accent); font-style: italic; }
  .sidebar-logo a { text-decoration: none; color: inherit; }

  .proj-btn {
    width: 100%; text-align: left; background: none; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
    font-family: 'Montserrat', sans-serif; transition: all 0.15s;
  }
  .proj-btn:hover { border-color: var(--accent); background: #fff8ec; }
  .proj-btn.active { background: #fff8ec; border-color: var(--accent); }
  .proj-btn .pnum { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--accent); letter-spacing: 0.08em; }
  .proj-btn .ptitle { font-size: 0.82rem; font-weight: 600; color: var(--text); margin-top: 2px; }
  .proj-btn .pauthor { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }
  .proj-btn .pvotes { font-size: 0.7rem; color: var(--success); margin-top: 3px; }

  .share-box {
    background: var(--surface2); border-radius: 8px; padding: 10px; margin-top: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .share-url { font-family: 'DM Mono', monospace; font-size: 0.62rem; color: var(--muted); flex: 1; word-break: break-all; }
  .copy-btn { flex-shrink: 0; background: var(--accent); color: #fff; border: none; padding: 4px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 600; cursor: pointer; }

  .btn-reset {
    width: 100%; padding: 0.6em; border-radius: 8px; border: 1px solid #f0c0b8;
    font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 600;
    color: #c0503a; background: none; cursor: pointer; margin-top: 12px;
    transition: background 0.15s;
  }
  .btn-reset:hover { background: #fce8e6; }

  /* MAIN */
  .main { flex: 1; overflow-y: auto; padding: 28px 32px; }

  .main-eyebrow { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 6px; }
  .main-title { font-family: 'DM Serif Display', serif; font-size: 2rem; letter-spacing: -0.5px; margin-bottom: 4px; }
  .main-title em { color: var(--accent); font-style: italic; }
  .main-sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }

  /* PROJECT HEADER */
  .proj-header {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .proj-emoji { font-size: 2.5rem; line-height: 1; }
  .proj-title { font-family: 'DM Serif Display', serif; font-size: 1.4rem; color: var(--text); }
  .proj-author { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-top: 2px; }
  .proj-count { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted); margin-left: auto; }

  /* AGGREGATE */
  .agg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .agg-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); margin-bottom: 14px; }
  .agg-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .agg-label { font-size: 0.82rem; color: var(--text); min-width: 220px; }
  .agg-bar-bg { flex: 1; height: 10px; background: var(--surface2); border-radius: 5px; }
  .agg-bar-fill { height: 10px; background: var(--accent); border-radius: 5px; transition: width 0.5s; }
  .agg-score { font-family: 'DM Mono', monospace; font-size: 0.85rem; color: var(--accent); font-weight: 600; min-width: 35px; text-align: right; }

  .total-score {
    background: #fff8ec; border: 1px solid var(--accent); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .total-label { font-size: 0.85rem; color: var(--muted); }
  .total-value { font-family: 'DM Serif Display', serif; font-size: 1.8rem; color: var(--accent); }

  /* VOTERS */
  .voters-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; }
  .voter-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .voter-name { font-weight: 600; font-size: 0.85rem; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
  .voter-tag-done { font-size: 0.65rem; color: var(--success); font-weight: 600; }
  .voter-tag-wait { font-size: 0.65rem; color: var(--muted); }
  .voter-dim { font-size: 0.7rem; color: var(--muted); margin-bottom: 3px; display: flex; align-items: center; justify-content: space-between; }
  .mini-stars { display: flex; gap: 1px; font-size: 0.75rem; color: var(--accent); }
  .mini-stars .empty { color: #d0ccc4; }

  /* RANKING */
  .ranking-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .ranking-row {
    display: flex; align-items: center; gap: 12px; padding: 10px 0;
    border-bottom: 1px solid var(--surface2);
  }
  .ranking-row:last-child { border-bottom: none; }
  .rank-pos { font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: var(--border); min-width: 32px; }
  .rank-emoji { font-size: 1.4rem; }
  .rank-info { flex: 1; }
  .rank-title { font-weight: 600; font-size: 0.9rem; }
  .rank-author { font-size: 0.75rem; color: var(--muted); }
  .rank-score { font-family: 'DM Mono', monospace; font-size: 1.1rem; color: var(--accent); font-weight: 600; }

  .conn-badge { position: fixed; top: 14px; right: 16px; font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); z-index: 100; display: flex; align-items: center; gap: 0.4em; }
  .conn-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--border); }
  .conn-badge.ok .conn-dot { background: var(--success); }
  .conn-badge.err .conn-dot { background: #c0503a; }

  .tab-bar { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn { background: none; border: none; border-bottom: 2px solid transparent; padding: 10px 16px; font-family: 'Montserrat', sans-serif; font-size: 0.82rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
</style>
</head>
<body>

<div class="conn-badge" id="connBadge"><span class="conn-dot"></span><span id="connText">Connessione...</span></div>

<div class="app">
  <div class="sidebar">
    <div class="sidebar-logo">Cosa<em>Retreat</em></div>

    <div style="font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Progetti</div>
    <div id="projBtns"></div>

    <div style="font-family:'DM Mono',monospace;font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-top:20px;margin-bottom:10px">Classifica globale</div>
    <button class="proj-btn" id="btnRanking" onclick="showRanking()">
      <div class="ptitle">🏆 Vedi ranking</div>
    </button>

    <div class="share-box">
      <span class="share-url" id="shareUrl">—</span>
      <button class="copy-btn" id="copyBtn">Copia</button>
    </div>

    <button class="btn-reset" onclick="resetAll()">Reset tutti i voti</button>
    <div style="margin-top:16px;text-align:center"><a href="index.html" style="font-family:'Montserrat',sans-serif;font-size:0.75rem;color:#5e5a54;text-decoration:none;">← Torna all'Agenda</a></div>
  </div>

  <div class="main" id="mainArea">
    <div class="main-eyebrow">AIdeas · Voti in tempo reale</div>
    <div class="main-title">AI<em>deas</em></div>
    <div class="main-sub">Seleziona un progetto dalla sidebar per vedere i risultati dettagliati.</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
var PLAYERS = ["Marco","Francesca","Tommaso","Margherita","Federica","Stefano","Daniele","Domitilla","Carola","Andrea","Giorgia"];
var PROJECTS = [
  { id:"01", titolo:"Delivery Planner",    autore:"Carola",     emoji:"📦" },
  { id:"02", titolo:"Good Morning KAM",    autore:"Margherita", emoji:"🌅" },
  { id:"03", titolo:"Find the Best Offer", autore:"Federica",   emoji:"🎯" },
  { id:"04", titolo:"NBA",                 autore:"Franci",     emoji:"🏀" }
];
var DIMS = ["Fattibilità","Impatto sui Ricavi","Impatto su Efficienza/Costi","Generazione di Asset Unico"];

firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var aideasRef = db.ref("cosaportoAIdeas/votes");

var allVotes = {};
var selectedProjId = null;
var showingRanking = false;

// Connessione
db.ref(".info/connected").on("value", function(snap){
  var badge = document.getElementById("connBadge");
  badge.className = "conn-badge " + (snap.val() ? "ok" : "err");
  document.getElementById("connText").textContent = snap.val() ? "Connesso" : "Disconnesso";
});

// Share
var playerUrl = new URL("aideas-player.html", window.location.href).toString();
document.getElementById("shareUrl").textContent = playerUrl;
document.getElementById("copyBtn").addEventListener("click", function(){
  navigator.clipboard.writeText(playerUrl).then(function(){
    var btn = document.getElementById("copyBtn");
    btn.textContent = "✓";
    setTimeout(function(){ btn.textContent = "Copia"; }, 1500);
  });
});

// Sidebar
function buildSidebar() {
  var container = document.getElementById("projBtns");
  container.innerHTML = "";
  PROJECTS.forEach(function(proj){
    var btn = document.createElement("button");
    btn.className = "proj-btn" + (proj.id === selectedProjId ? " active" : "");
    btn.id = "pbtn-" + proj.id;
    btn.innerHTML =
      '<div class="pnum">' + proj.emoji + ' Progetto ' + proj.id + '</div>' +
      '<div class="ptitle">' + proj.titolo + '</div>' +
      '<div class="pauthor">by ' + proj.autore + '</div>' +
      '<div class="pvotes" id="pvotes-' + proj.id + '"></div>';
    btn.addEventListener("click", function(){
      selectedProjId = proj.id;
      showingRanking = false;
      document.querySelectorAll(".proj-btn").forEach(function(b){ b.classList.remove("active"); });
      btn.classList.add("active");
      document.getElementById("btnRanking").classList.remove("active");
      renderProject(proj.id);
    });
    container.appendChild(btn);
  });
}

function updateVoteCounts() {
  PROJECTS.forEach(function(proj){
    var el = document.getElementById("pvotes-" + proj.id);
    if (!el) return;
    var votes = allVotes[proj.id] || {};
    var count = Object.keys(votes).length;
    el.textContent = count > 0 ? count + " / " + PLAYERS.length + " voti" : "";
  });
}

// Firebase listener
aideasRef.on("value", function(snap){
  allVotes = snap.val() || {};
  updateVoteCounts();
  if (showingRanking) renderRanking();
  else if (selectedProjId) renderProject(selectedProjId);
});

function avgScore(projId) {
  var votes = allVotes[projId] || {};
  var total = 0; var count = 0;
  Object.values(votes).forEach(function(v){
    if (v.scores) {
      Object.values(v.scores).forEach(function(s){ total += s; count++; });
    }
  });
  return count > 0 ? total / count : 0;
}

function renderProject(projId) {
  var proj = PROJECTS.find(function(p){ return p.id === projId; });
  var votes = allVotes[projId] || {};
  var voteCount = Object.keys(votes).length;

  // Aggregate per dimensione
  var totals = {}; var counts = {};
  DIMS.forEach(function(_, di){ totals[di] = 0; counts[di] = 0; });
  Object.values(votes).forEach(function(v){
    if (!v.scores) return;
    Object.keys(v.scores).forEach(function(di){
      totals[di] = (totals[di]||0) + v.scores[di];
      counts[di] = (counts[di]||0) + 1;
    });
  });

  var overallAvg = 0; var dimCount = 0;
  DIMS.forEach(function(_, di){
    if (counts[di] > 0) { overallAvg += totals[di]/counts[di]; dimCount++; }
  });
  var finalScore = dimCount > 0 ? (overallAvg / dimCount).toFixed(2) : "—";

  var html =
    '<div class="proj-header">' +
      '<div class="proj-emoji">' + proj.emoji + '</div>' +
      '<div><div class="proj-title">' + proj.titolo + '</div><div class="proj-author">by ' + proj.autore + '</div></div>' +
      '<div class="proj-count">' + voteCount + ' / ' + PLAYERS.length + ' voti</div>' +
    '</div>' +

    '<div class="total-score">' +
      '<div class="total-label">Score medio complessivo</div>' +
      '<div class="total-value">' + finalScore + ' <span style="font-size:1rem;color:var(--muted)">/ 5</span></div>' +
    '</div>' +

    '<div class="agg-card">' +
      '<div class="agg-title">Media per dimensione</div>';

  DIMS.forEach(function(dim, di){
    var avg = counts[di] > 0 ? (totals[di]/counts[di]) : 0;
    html += '<div class="agg-row">' +
      '<div class="agg-label">' + dim + '</div>' +
      '<div class="agg-bar-bg"><div class="agg-bar-fill" style="width:' + (avg/5*100) + '%"></div></div>' +
      '<div class="agg-score">' + (avg > 0 ? avg.toFixed(1) : "—") + '</div>' +
    '</div>';
  });
  html += '</div>';

  // Voti individuali
  html += '<div style="font-size:0.72rem;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:12px">Voti individuali</div>';
  html += '<div class="voters-grid">';
  PLAYERS.forEach(function(player){
    var v = votes[player];
    html += '<div class="voter-card"><div class="voter-name">' + player;
    html += v ? '<span class="voter-tag-done">✓</span>' : '<span class="voter-tag-wait">...</span>';
    html += '</div>';
    if (v && v.scores) {
      DIMS.forEach(function(dim, di){
        var score = v.scores[di] || 0;
        var stars = '';
        for (var s = 1; s <= 5; s++) stars += '<span class="' + (s <= score ? '' : 'empty') + '">★</span>';
        html += '<div class="voter-dim"><span>' + dim.split('/')[0].trim() + '</span><div class="mini-stars">' + stars + '</div></div>';
      });
    } else {
      html += '<div style="font-size:0.75rem;color:var(--border);font-style:italic;margin-top:4px">Nessun voto</div>';
    }
    html += '</div>';
  });
  html += '</div>';

  document.getElementById("mainArea").innerHTML = html;
}

function showRanking() {
  showingRanking = true;
  selectedProjId = null;
  document.querySelectorAll(".proj-btn").forEach(function(b){ b.classList.remove("active"); });
  document.getElementById("btnRanking").classList.add("active");
  renderRanking();
}

function renderRanking() {
  var ranked = PROJECTS.map(function(proj){
    return { proj: proj, avg: avgScore(proj.id), votes: Object.keys(allVotes[proj.id]||{}).length };
  }).sort(function(a,b){ return b.avg - a.avg; });

  var medals = ["🥇","🥈","🥉","4️⃣"];
  var html =
    '<div class="main-eyebrow">AIdeas · Classifica</div>' +
    '<div class="main-title">Ranking <em>finale</em></div>' +
    '<div class="main-sub">Punteggio medio complessivo su tutte le dimensioni.</div>' +
    '<div class="ranking-card">';

  ranked.forEach(function(item, i){
    html += '<div class="ranking-row">' +
      '<div class="rank-pos">' + (medals[i]||'') + '</div>' +
      '<div class="rank-emoji">' + item.proj.emoji + '</div>' +
      '<div class="rank-info">' +
        '<div class="rank-title">' + item.proj.titolo + '</div>' +
        '<div class="rank-author">by ' + item.proj.autore + ' · ' + item.votes + ' voti</div>' +
      '</div>' +
      '<div class="rank-score">' + (item.avg > 0 ? item.avg.toFixed(2) : "—") + '</div>' +
    '</div>';
  });

  html += '</div>';
  document.getElementById("mainArea").innerHTML = html;
}

function resetAll() {
  if (!confirm("Cancellare tutti i voti AIdeas?")) return;
  db.ref("cosaportoAIdeas").remove();
}

buildSidebar();
</script>
</body>
</html>
